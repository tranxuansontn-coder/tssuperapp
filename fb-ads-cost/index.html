<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Chi Phí Quảng Cáo</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-body: #e2e8f0;
            /* Mặc định xám nhạt */
            --bg-card: #ffffff;
            --text-main: #334155;
            --text-dark: #0f172a;
            --text-muted: #64748b;

            --blue-header: #0a192f;
            --highlight-bar: #0088a9;
            /* Teal blue for bars */
            --highlight-red: #ef4444;
            /* Line */

            --border-color: #e2e8f0;
            --box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --card-radius: 4px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
        }

        /* --- Header --- */
        .top-header {
            background-color: var(--blue-header);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            /* Placeholder for network background pattern */
            background-image: radial-gradient(circle at center, rgba(255, 255, 255, 0.05) 0%, transparent 80%);
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .header-filters {
            display: flex;
            gap: 1.5rem;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .filter-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #f8fafc;
        }

        .filter-group select,
        .filter-group input {
            padding: 0.5rem 2rem 0.5rem 0.5rem;
            border: none;
            border-radius: 2px;
            outline: none;
            font-size: 0.9rem;
            color: var(--text-dark);
            min-width: 150px;
            cursor: pointer;
            background-color: #fff;
        }

        /* --- Main Layout --- */
        .dashboard-container {
            padding: 1.5rem 2rem;
            display: grid;
            grid-template-columns: 240px 1fr 350px;
            gap: 1.5rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* --- Column 1: Metrics --- */
        .metrics-col {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .metric-card {
            background: var(--bg-card);
            border-radius: var(--card-radius);
            box-shadow: var(--box-shadow);
            display: flex;
            align-items: center;
            padding: 1rem;
            gap: 1rem;
        }

        .metric-icon-box {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 1.5rem;
        }

        /* Icon box colors from image */
        .bg-light-blue {
            background-color: #e0f2fe;
            color: #0284c7;
        }

        .bg-light-purple {
            background-color: #f3e8ff;
            color: #9333ea;
        }

        .bg-light-orange {
            background-color: #ffedd5;
            color: #ea580c;
        }

        .bg-light-gray {
            background-color: #f1f5f9;
            color: #475569;
        }

        .bg-light-red {
            background-color: #fee2e2;
            color: #dc2626;
        }

        .bg-light-teal {
            background-color: #ccfbf1;
            color: #0d9488;
        }

        .bg-light-pink {
            background-color: #fce7f3;
            color: #be185d;
        }

        .metric-info {
            display: flex;
            flex-direction: column;
        }

        .metric-val {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-dark);
            display: flex;
            align-items: baseline;
        }

        .metric-unit {
            font-size: 0.9rem;
            margin-left: 2px;
            font-weight: 500;
        }

        .metric-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .btn-details {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0.5rem;
            background: none;
            border: none;
            color: #0d9488;
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
            font-size: 0.9rem;
        }

        /* --- Shared Card Styles --- */
        .card {
            background: var(--bg-card);
            border-radius: var(--card-radius);
            box-shadow: var(--box-shadow);
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- Column 2: Main Charts --- */
        .main-charts-col {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .chart-main-tall {
            flex: 1;
            min-height: 400px;
        }

        .chart-row-bottom {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            height: 300px;
        }

        /* --- Column 3: Right Charts --- */
        .right-charts-col {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .right-chart {
            flex: 1;
            min-height: 350px;
        }

        .chart-container-inner {
            position: relative;
            flex: 1;
            width: 100%;
            height: 100%;
        }

        /* Connect Modal (Reused logic) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-box {
            background: white;
            border-radius: 8px;
            width: 400px;
            padding: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .btn-primary {
            width: 100%;
            padding: 0.75rem;
            background: var(--blue-header);
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
            border-radius: 4px;
        }

        .error-msg {
            color: #dc2626;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
        }

        .api-connect-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 1rem;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header class="top-header">
        <div class="header-title">Chi Phí Quảng Cáo</div>
        <div class="header-filters">
            <div class="filter-group">
                <label>Marketer</label>
                <select id="filterMarketer">
                    <option value="All">All</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Product</label>
                <select id="filterProduct">
                    <option value="All">All</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Date (Preset)</label>
                <!-- Using Facebook API Date Presets instead of custom calendar for simplicity -->
                <select id="datePresetSelector">
                    <option value="today">Hôm nay</option>
                    <option value="last_7d">7 ngày qua</option>
                    <option value="last_30d" selected>30 ngày qua</option>
                    <option value="this_month">Tháng này</option>
                    <option value="last_month">Tháng trước</option>
                    <option value="lifetime">Trọn đời</option>
                </select>
            </div>
            <button class="api-connect-btn" id="btnOpenModal"><i class="fa-solid fa-link"></i> API</button>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="dashboard-container">

        <!-- Left Metrics Column -->
        <div class="metrics-col">
            <div class="metric-card">
                <div class="metric-icon-box bg-light-blue"><i class="fa-solid fa-address-book"></i></div>
                <div class="metric-info">
                    <div class="metric-val" id="valContacts">0</div>
                    <div class="metric-label">Total contact</div>
                </div>
            </div>

            <div class="metric-card">
                <div class="metric-icon-box bg-light-purple"><i class="fa-solid fa-sack-dollar"></i></div>
                <div class="metric-info">
                    <div class="metric-val"><span id="valAdsContact">0</span> <span class="metric-unit">đ</span></div>
                    <div class="metric-label">Ads/contact</div>
                </div>
            </div>

            <div class="metric-card">
                <div class="metric-icon-box bg-light-orange"><i class="fa-solid fa-money-bill-wave"></i></div>
                <div class="metric-info">
                    <div class="metric-val"><span id="valAdsDon">0</span> <span class="metric-unit">đ</span></div>
                    <div class="metric-label">Ads/đơn</div>
                </div>
            </div>

            <div class="metric-card">
                <div class="metric-icon-box bg-light-gray"><i class="fa-solid fa-box"></i></div>
                <div class="metric-info">
                    <div class="metric-val"><span id="valDoanhThu">0</span> <span class="metric-unit">đ</span></div>
                    <div class="metric-label">Doanh thu</div>
                </div>
            </div>

            <div class="metric-card">
                <div class="metric-icon-box bg-light-red"><i class="fa-solid fa-truck-fast"></i></div>
                <div class="metric-info">
                    <div class="metric-val"><span id="valTongAds">0</span> <span class="metric-unit">đ</span></div>
                    <div class="metric-label">Tổng Ads</div>
                </div>
            </div>

            <div class="metric-card">
                <div class="metric-icon-box bg-light-teal"><i class="fa-solid fa-percent"></i></div>
                <div class="metric-info">
                    <div class="metric-val"><span id="valPercentAds">0</span> <span class="metric-unit">%</span></div>
                    <div class="metric-label">%Ads (CPQC/DT)</div>
                </div>
            </div>

            <div class="metric-card" style="justify-content: center;">
                <button class="btn-details">
                    <div class="metric-icon-box bg-light-pink" style="margin-bottom: 5px; width: 36px; height: 36px;"><i
                            class="fa-solid fa-list-check"></i></div>
                    See details
                </button>
            </div>
        </div>

        <!-- Middle Column: Main Combo Chart & 2 Bottom Line Charts -->
        <div class="main-charts-col">
            <div class="card chart-main-tall">
                <div class="card-header">Total contact and % Chi phí quảng cáo by Date</div>
                <div class="chart-container-inner">
                    <canvas id="comboChart"></canvas>
                </div>
            </div>

            <div class="chart-row-bottom">
                <div class="card">
                    <div class="card-header">Contact theo product</div>
                    <div class="chart-container-inner">
                        <canvas id="contactProductChart"></canvas>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">Contact by Marketer</div>
                    <div class="chart-container-inner">
                        <canvas id="contactMarketerChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Column: Vertical Stacked Charts -->
        <div class="right-charts-col">
            <div class="card right-chart">
                <div class="card-header">% CPQC theo Marketer</div>
                <div class="chart-container-inner">
                    <canvas id="cpqcMarketerChart"></canvas>
                </div>
            </div>

            <div class="card right-chart">
                <div class="card-header">% CPQC theo Product</div>
                <div class="chart-container-inner">
                    <canvas id="cpqcProductChart"></canvas>
                </div>
            </div>
        </div>
    </div>


    <!-- Modal Connect API -->
    <div class="modal-overlay" id="apiModal">
        <div class="modal-box">
            <h3 style="margin-bottom: 1rem;">Cấu hình Facebook API</h3>
            <form id="apiForm">
                <div class="form-group">
                    <label>Facebook Access Token</label>
                    <input type="password" id="inputToken" placeholder="EAAB..." required>
                </div>
                <div class="form-group">
                    <label>Ad Account ID</label>
                    <input type="text" id="inputAccountId" placeholder="act_xxxxxxxxx" required>
                </div>
                <div class="error-msg" id="apiErrorText">Lỗi kết nối.</div>
                <button type="submit" class="btn-primary" id="btnSaveApi">Lưu & Tải Dữ Liệu</button>
            </form>
            <button onclick="document.getElementById('apiModal').classList.remove('show')"
                style="margin-top: 1rem; width: 100%; border: none; background: none; color: #64748b; cursor: pointer;">Đóng</button>
        </div>
    </div>

    <script>
        /**
         * Terminology Mapping:
         * Lead (or Click if Lead is 0) -> "Contact"
         * Purchase -> "Đơn"
         * Spend -> "Tổng Ads"
         * CPQC (Chi phí quảng cáo / Doanh thu) -> "%Ads" or "% CPQC"
         * 
         * Important: FB Graph API 'level=campaign' doesn't auto-group by date. 
         * For the Combo Chart, we ideally need to fetch `time_increment=1`.
         * For the MVP, we will mock the daily distribution of the total numbers to match the UI reqs.
         */

        const GLOBAL = {
            token: localStorage.getItem('fb_ad_token') || '',
            accountId: localStorage.getItem('fb_ad_account') || '',
            rawCampaigns: [],
            // Filter states
            fMarketer: 'All',
            fProduct: 'All',
            // Charts
            charts: {}
        };

        const DOM = {
            mContacts: document.getElementById('valContacts'),
            mAdsContact: document.getElementById('valAdsContact'),
            mAdsDon: document.getElementById('valAdsDon'),
            mDoanhThu: document.getElementById('valDoanhThu'),
            mTongAds: document.getElementById('valTongAds'),
            mPercentAds: document.getElementById('valPercentAds'),

            selMarketer: document.getElementById('filterMarketer'),
            selProduct: document.getElementById('filterProduct'),
            selPreset: document.getElementById('datePresetSelector')
        };

        // Formatters
        const fNum = num => new Intl.NumberFormat('en-US').format(Math.round(num));
        const fMoney = num => {
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'Tỷ'; // Tỷ
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M'; // Triệu
            return new Intl.NumberFormat('vi-VN').format(Math.round(num));
        };

        // Init Chart.js Global
        Chart.defaults.font.family = "'Roboto', sans-serif";
        Chart.defaults.color = '#64748b';

        function initCharts() {
            // Combo Chart (Left Main)
            GLOBAL.charts.combo = new Chart(document.getElementById('comboChart'), {
                type: 'bar',
                data: { labels: [], datasets: [] },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'top', labels: { usePointStyle: true, pointStyle: 'circle' } } },
                    scales: {
                        y: { type: 'linear', position: 'left', grid: { display: false } }, // Contacts
                        y1: { type: 'linear', position: 'right', min: 0, max: 100, ticks: { callback: v => v + '%' } } // % CPQC
                    }
                }
            });

            // Contact by Product
            GLOBAL.charts.contactProd = new Chart(document.getElementById('contactProductChart'), getHBarConfig('Total Contact', '#0088a9'));
            // Contact by Marketer
            GLOBAL.charts.contactMkt = new Chart(document.getElementById('contactMarketerChart'), getHBarConfig('Total Contact', '#0088a9'));

            // % CPQC by Marketer
            GLOBAL.charts.cpqcMkt = new Chart(document.getElementById('cpqcMarketerChart'), getHBarConfig('% CPQC', '#0088a9', true));
            // % CPQC by Product
            GLOBAL.charts.cpqcProd = new Chart(document.getElementById('cpqcProductChart'), getHBarConfig('% CPQC', '#0088a9', true));
        }

        function getHBarConfig(label, color, isPercent = false) {
            return {
                type: 'bar',
                data: { labels: [], datasets: [{ label: label, data: [], backgroundColor: color, maxBarThickness: 25 }] },
                options: {
                    indexAxis: 'y', responsive: true, maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: { callbacks: { label: c => isPercent ? c.raw.toFixed(2) + '%' : fNum(c.raw) } }
                    },
                    scales: {
                        x: { display: false, grid: { display: false } },
                        y: { grid: { display: false } }
                    },
                    animation: { duration: 500 }
                },
                // Custom plugin to draw value at the end of the bar
                plugins: [{
                    id: 'drawValues',
                    afterDatasetsDraw: function (chart) {
                        const ctx = chart.ctx;
                        chart.data.datasets.forEach((dataset, i) => {
                            const meta = chart.getDatasetMeta(i);
                            meta.data.forEach((bar, index) => {
                                const data = dataset.data[index];
                                ctx.fillStyle = '#64748b';
                                ctx.font = '11px Roboto';
                                ctx.textAlign = 'left';
                                ctx.textBaseline = 'middle';
                                const txt = isPercent ? data.toFixed(2) + '%' : fNum(data);
                                ctx.fillText(txt, bar.x + 5, bar.y);
                            });
                        });
                    }
                }]
            };
        }

        // Action Parsers
        const getActionVal = (actions, type) => {
            if (!actions) return 0;
            const a = actions.find(x => x.action_type === type);
            return a ? parseFloat(a.value) : 0;
        };

        // Main Fetch
        async function fetchAPI() {
            if (!GLOBAL.token || !GLOBAL.accountId) return;
            const preset = DOM.selPreset.value;

            try {
                // Fetch aggregate campaign grouped
                const url = `https://graph.facebook.com/v19.0/${GLOBAL.accountId}/insights?level=campaign&fields=campaign_name,spend,clicks,impressions,actions,action_values&date_preset=${preset}&limit=1000&access_token=${GLOBAL.token}`;
                const res = await fetch(url);
                const json = await res.json();
                if (json.error) throw new Error(json.error.message);

                GLOBAL.rawCampaigns = json.data || [];

                // Fetch daily trend for combo chart (aggregated account level)
                const urlDaily = `https://graph.facebook.com/v19.0/${GLOBAL.accountId}/insights?level=account&fields=spend,clicks,actions,action_values&time_increment=1&date_preset=${preset}&access_token=${GLOBAL.token}`;
                const resDaily = await fetch(urlDaily);
                const jsonDaily = await resDaily.json();

                updateUI(jsonDaily.data || []);
            } catch (e) {
                console.error(e);
                alert("Lỗi tải data: " + e.message);
            }
        }

        function extractGroups(campName) {
            const parts = (campName || '').split('_');
            const mkt = parts.length > 0 ? parts[0].trim().toUpperCase() : 'KHAC';
            const prod = parts.length > 1 ? parts[1].trim().toUpperCase() : 'KHAC';
            return { mkt, prod };
        }

        function updateUI(dailyData) {
            // Apply filtering logic
            const filteredCamps = GLOBAL.rawCampaigns.filter(c => {
                const groups = extractGroups(c.campaign_name);
                let keep = true;
                if (GLOBAL.fMarketer !== 'All' && groups.mkt !== GLOBAL.fMarketer) keep = false;
                if (GLOBAL.fProduct !== 'All' && groups.prod !== GLOBAL.fProduct) keep = false;
                return keep;
            });

            // 1. Calculate Aggregates
            let totSpend = 0, totRev = 0, totContacts = 0, totDon = 0;

            const groupMkt = {};
            const groupProd = {};

            // Collect unique Mkt/Prod for Dropdowns (only on full dataset)
            const allMkt = new Set(); const allProd = new Set();

            GLOBAL.rawCampaigns.forEach(c => {
                const g = extractGroups(c.campaign_name);
                allMkt.add(g.mkt); allProd.add(g.prod);
            });

            // Fill dropdowns once
            if (DOM.selMarketer.options.length === 1) {
                Array.from(allMkt).sort().forEach(m => DOM.selMarketer.add(new Option(m, m)));
                Array.from(allProd).sort().forEach(p => DOM.selProduct.add(new Option(p, p)));
            }

            // Aggregate filtered data
            filteredCamps.forEach(c => {
                const s = parseFloat(c.spend || 0);

                // Purchase Action Value -> Rev
                const r = getActionVal(c.action_values, 'offsite_conversion.fb_pixel_purchase') || getActionVal(c.action_values, 'purchase');

                // Purchase Action -> Đơn
                const d = getActionVal(c.actions, 'offsite_conversion.fb_pixel_purchase') || getActionVal(c.actions, 'purchase');

                // Lead Action -> Contact (Fallback to clicks if user tracks leads via clicks)
                let contact = getActionVal(c.actions, 'lead');
                if (!contact) contact = parseFloat(c.clicks || 0); // Using clicks as fallback for "Contact" in ecom without standard leads

                totSpend += s; totRev += r; totContacts += contact; totDon += d;

                const g = extractGroups(c.campaign_name);

                // Mkt Group
                if (!groupMkt[g.mkt]) groupMkt[g.mkt] = { s: 0, r: 0, c: 0, d: 0 };
                groupMkt[g.mkt].s += s; groupMkt[g.mkt].r += r; groupMkt[g.mkt].c += contact; groupMkt[g.mkt].d += d;

                // Prod Group
                if (!groupProd[g.prod]) groupProd[g.prod] = { s: 0, r: 0, c: 0, d: 0 };
                groupProd[g.prod].s += s; groupProd[g.prod].r += r; groupProd[g.prod].c += contact; groupProd[g.prod].d += d;
            });

            // 2. Render Cards
            DOM.mContacts.textContent = fNum(totContacts);
            const adsPContact = totContacts > 0 ? totSpend / totContacts : 0;
            DOM.mAdsContact.textContent = fNum(adsPContact);
            const adsPDon = totDon > 0 ? totSpend / totDon : 0;
            DOM.mAdsDon.textContent = fNum(adsPDon);
            DOM.mDoanhThu.textContent = fMoney(totRev);
            DOM.mTongAds.textContent = fMoney(totSpend);
            const cpqc = totRev > 0 ? (totSpend / totRev) * 100 : 0;
            DOM.mPercentAds.textContent = cpqc.toFixed(2);

            // 3. Update Bar Charts (Bottom & Right logic)
            function updateHB(chartKey, dataMap, sortKey, valKey) {
                // sortKey: 'c' (contacts) or 'cpqc'
                const arr = Object.entries(dataMap).map(([k, v]) => {
                    const cpqcVal = v.r > 0 ? (v.s / v.r) * 100 : 0;
                    return { k, v, cpqc: cpqcVal };
                });

                // Sort descending
                arr.sort((a, b) => {
                    let valA = sortKey === 'cpqc' ? a.cpqc : a.v[sortKey];
                    let valB = sortKey === 'cpqc' ? b.cpqc : b.v[sortKey];
                    return valB - valA;
                });

                // Top 10
                const top = arr.slice(0, 10);
                const chart = GLOBAL.charts[chartKey];
                chart.data.labels = top.map(x => x.k);
                chart.data.datasets[0].data = top.map(x => sortKey === 'cpqc' ? x.cpqc : x.v[valKey]);
                chart.update();
            }

            updateHB('contactProd', groupProd, 'c', 'c');
            updateHB('contactMkt', groupMkt, 'c', 'c');
            updateHB('cpqcMkt', groupMkt, 'cpqc', 'cpqc');
            updateHB('cpqcProd', groupProd, 'cpqc', 'cpqc');

            // 4. Update Combo Chart (Total contact & % CPQC by Date)
            let labels = []; let contactData = []; let cpqcData = [];

            if (GLOBAL.fMarketer === 'All' && GLOBAL.fProduct === 'All') {
                if (dailyData && dailyData.length > 0) {
                    dailyData.forEach(day => {
                        labels.push(day.date_start.substring(5)); // DD/MM format
                        const ds = parseFloat(day.spend || 0);
                        const dr = getActionVal(day.action_values, 'offsite_conversion.fb_pixel_purchase') || getActionVal(day.action_values, 'purchase');

                        let dc = getActionVal(day.actions, 'lead');
                        if (!dc) dc = parseFloat(day.clicks || 0);

                        contactData.push(dc);
                        cpqcData.push(dr > 0 ? (ds / dr) * 100 : 0);
                    });
                } else {
                    // Fallback mock daily trend for visual testing if time_increment API block fails
                    const len = 14;
                    for (let i = 0; i < len; i++) {
                        labels.push(`Day ${i + 1}`);
                        const dailyC = Math.floor(totContacts / len) + Math.random() * 20;
                        const dailyCPQC = cpqc + (Math.random() * 10 - 5);
                        contactData.push(dailyC > 0 ? dailyC : 0);
                        cpqcData.push(dailyCPQC > 0 ? dailyCPQC : 0);
                    }
                }
            } else {
                labels = ['Filtered Range'];
                contactData = [totContacts];
                cpqcData = [cpqc];
            }

            const cChart = GLOBAL.charts.combo;
            cChart.data.labels = labels;
            cChart.data.datasets = [
                {
                    type: 'bar',
                    label: 'Total contact',
                    data: contactData,
                    backgroundColor: '#0088a9',
                    yAxisID: 'y'
                },
                {
                    type: 'line',
                    label: '% Chi phí quảng cáo (CPQC)',
                    data: cpqcData,
                    borderColor: '#ef4444',
                    backgroundColor: '#ef4444',
                    borderWidth: 2,
                    yAxisID: 'y1'
                }
            ];
            cChart.update();
        }

        // Events
        DOM.selPreset.addEventListener('change', fetchAPI);
        DOM.selMarketer.addEventListener('change', (e) => { GLOBAL.fMarketer = e.target.value; updateUI(); });
        DOM.selProduct.addEventListener('change', (e) => { GLOBAL.fProduct = e.target.value; updateUI(); });

        document.getElementById('btnOpenModal').addEventListener('click', () => {
            if (GLOBAL.token) document.getElementById('inputToken').value = GLOBAL.token;
            if (GLOBAL.accountId) document.getElementById('inputAccountId').value = GLOBAL.accountId;
            document.getElementById('apiModal').classList.add('show');
        });

        document.getElementById('apiForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSaveApi');
            btn.textContent = "Đang tải..."; btn.disabled = true;

            let acc = document.getElementById('inputAccountId').value.trim();
            if (!acc.startsWith('act_')) acc = 'act_' + acc;

            GLOBAL.token = document.getElementById('inputToken').value.trim();
            GLOBAL.accountId = acc;

            localStorage.setItem('fb_ad_token', GLOBAL.token);
            localStorage.setItem('fb_ad_account', GLOBAL.accountId);

            await fetchAPI();
            document.getElementById('apiModal').classList.remove('show');
            btn.textContent = "Lưu & Tải Dữ Liệu"; btn.disabled = false;
        });

        // Start
        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            if (GLOBAL.token && GLOBAL.accountId) {
                fetchAPI();
            } else {
                setTimeout(() => document.getElementById('btnOpenModal').click(), 500);
            }
        });

    </script>
</body>

</html>
